[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
# asyncio_mode=auto lets async test functions run without an explicit marker
# and integrates with the pytest-homeassistant-custom-component plugin, whose
# fixtures (hass, MockConfigEntry, enable_custom_integrations) drive the
# config-flow / setup tests. The lightweight YAML/const tests stay sync.
asyncio_mode = auto
addopts = -ra

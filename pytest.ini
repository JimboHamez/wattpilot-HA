[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
# -ra: show reasons for skips/xfails.
# -p no:homeassistant: disable the pytest-homeassistant-custom-component plugin
#   for this unit-focused suite. Its autouse fixtures manage an event loop and
#   assume tests run under the `hass` harness, which clashes with the plain
#   asyncio.run() helpers here. The homeassistant *library* stays importable, so
#   utils.py still imports. Drop this flag (and add the `hass` fixture) if/when
#   full end-to-end integration tests are added.
addopts = -ra -p no:homeassistant
